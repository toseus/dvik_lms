<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — ДВИК СЭО</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --header-bg:      #0f62ae;
  --accent:         #0f62ae;
  --accent-hover:   #0a4d8c;
  --accent-light:   #d0e4f7;
  --accent-mid:     #b3d4f0;
  --sidebar-bg:     #f3f5f8;
  --sidebar-border: #c4d2e2;
  --text-primary:   #1a2433;
  --text-secondary: #3d5269;
  --text-muted:     #7a93ad;
  --border:         #e0eaf5;
  --status-green:   #107c10;
  --status-green-bg:#dff6dd;
  --status-red:     #a4262c;
  --status-red-bg:  #fde7e9;
  --white:          #ffffff;
  --font:           'Golos Text', 'Segoe UI', sans-serif;
  --page-bg:        #f0f4f9;
  --card-bg:        #ffffff;
  --shadow-card:    0 2px 12px rgba(15,98,174,0.08);
  --radius:         8px;
  --radius-sm:      5px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }

body {
  font-family: var(--font);
  font-size: 15px;
  color: var(--text-primary);
  background: var(--page-bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.app-header {
  background: var(--header-bg);
  color: #fff;
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 24px;
  flex-shrink: 0;
  gap: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.22);
}
.logo-icon {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.2);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.app-title { font-size: 16px; font-weight: 700; }

/* ── ЦЕНТРАЛЬНАЯ ЗОНА ── */
.login-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px 40px;
}

.login-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 32px rgba(15,98,174,0.12);
  width: 100%;
  max-width: 420px;
  overflow: hidden;
}

/* Синяя плашка заголовка */
.login-header {
  background: var(--header-bg);
  padding: 28px 32px 24px;
  color: #fff;
  text-align: center;
}
.login-logo {
  width: 60px; height: 60px;
  background: rgba(255,255,255,0.2);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 14px;
  border: 2px solid rgba(255,255,255,0.3);
}
.login-title    { font-size: 22px; font-weight: 900; margin-bottom: 4px; letter-spacing: -0.01em; }
.login-subtitle { font-size: 13px; opacity: 0.8; }

/* Тело формы */
.login-body { padding: 28px 32px 32px; }

.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.form-input {
  display: block;
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--page-bg);
  font-family: var(--font);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(15,98,174,0.12);
  background: var(--white);
}
.form-input::placeholder { color: var(--text-muted); }

/* Поле пароля с иконкой */
.input-wrap { position: relative; }
.input-wrap .form-input { padding-right: 44px; }
.btn-eye {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  padding: 4px;
  display: flex; align-items: center;
  transition: color 0.13s;
}
.btn-eye:hover { color: var(--accent); }
.btn-eye svg { width: 18px; height: 18px; }

/* Подсказка под полем */
.form-hint {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
}
.form-hint.info {
  background: var(--accent-light);
  border: 1px solid var(--accent-mid);
  border-radius: var(--radius-sm);
  padding: 7px 11px;
  color: var(--accent);
  font-weight: 500;
}

/* Ошибка */
.error-msg {
  display: none;
  background: var(--status-red-bg);
  border: 1px solid #e8a0a3;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--status-red);
  font-weight: 600;
  margin-bottom: 18px;
  gap: 8px;
  align-items: center;
}
.error-msg.visible { display: flex; }

/* Кнопка входа */
.btn-login {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(15,98,174,0.35);
  transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
  margin-top: 6px;
}
.btn-login:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 18px rgba(15,98,174,0.45);
  transform: translateY(-1px);
}
.btn-login:active { transform: translateY(0); }
.btn-login svg { width: 18px; height: 18px; }

/* Спиннер */
.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Успех */
.success-state {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 10px 0 6px;
}
.success-icon {
  width: 56px; height: 56px;
  background: var(--status-green-bg);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  border: 2px solid #8fcb8f;
}
.success-text { font-size: 16px; font-weight: 700; color: var(--status-green); text-align: center; }

/* Статусная строка */
.status-bar {
  background: var(--sidebar-bg);
  border-top: 1px solid var(--sidebar-border);
  padding: 8px 24px;
  font-size: 12px;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 8px;
}
.status-dot { color: var(--status-green); font-size: 10px; }

/* ── АДАПТИВ ── */
@media (max-width: 480px) {
  .login-body   { padding: 22px 20px 26px; }
  .login-header { padding: 22px 20px 20px; }
  .login-title  { font-size: 18px; }
  .login-logo   { width: 48px; height: 48px; font-size: 26px; }
  .app-header   { padding: 0 14px; }
  .app-title    { font-size: 14px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo-icon">📚</div>
  <span class="app-title">ДВИК — Система электронного обучения</span>
</header>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">🎓</div>
      <div class="login-title">Вход в систему</div>
      <div class="login-subtitle">Система электронного дистанционного обучения</div>
    </div>

    <div class="login-body">

      <div class="error-msg" id="errorMsg">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8" cy="8" r="6.5"/><path d="M8 5v4M8 10.5v.5" stroke-linecap="round"/>
        </svg>
        <span id="errorText">Неверный логин или пароль</span>
      </div>

      <div id="formState">
        <div class="form-group">
          <label class="form-label" for="loginInput">Логин</label>
          <input
            class="form-input" type="text" id="loginInput"
            placeholder="Введите логин" autocomplete="username"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>

        <div class="form-group">
          <label class="form-label" for="passInput">Пароль</label>
          <div class="input-wrap">
            <input
              class="form-input" type="password" id="passInput"
              placeholder="Введите пароль" autocomplete="current-password"
              onkeydown="if(event.key==='Enter')doLogin()">
            <button class="btn-eye" type="button" onclick="togglePass(this)" tabindex="-1">
              <svg id="eyeIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1.5 8C3 4.5 5.5 3 8 3s5 1.5 6.5 5c-1.5 3.5-4 5-6.5 5S3 11.5 1.5 8z"/>
                <circle cx="8" cy="8" r="2"/>
              </svg>
            </button>
          </div>
          <div class="form-hint info">
            💡 Демо-доступ: логин <strong>morozov</strong>, пароль <strong>1234</strong>
          </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="spinner" id="spinner"></div>
          <span id="loginBtnText">Войти в систему</span>
        </button>
      </div>

      <div class="success-state" id="successState">
        <div class="success-icon">✓</div>
        <div class="success-text">Авторизация успешна!<br><small style="font-weight:500;font-size:13px;color:var(--text-muted)">Переход в личный кабинет…</small></div>
      </div>

    </div>
  </div>
</div>

<footer class="status-bar">
  <span class="status-dot">●</span>
  <span>ДВИК СЭО — Защищённое соединение</span>
  <span style="margin-left:auto">v1.0</span>
</footer>

<script>
/* ── Автономный скрипт, не зависит от script.js ── */

const DEMO_USERS = [
  { login:'morozov',  password:'1234', name:'Морозов Сергей Александрович',  role:'student',  courseIds:['stcw','safety','navigation','radio'] },
  { login:'ivanova',  password:'1234', name:'Иванова Мария Петровна',         role:'student',  courseIds:['stcw','navigation'] },
  { login:'petrov',   password:'1234', name:'Петров Алексей Иванович',         role:'student',  courseIds:['safety','radio'] },
  { login:'sidorov',  password:'1234', name:'Сидоров Дмитрий Олегович',        role:'student',  courseIds:['stcw','safety','navigation'] },
  { login:'kozlova',  password:'1234', name:'Козлова Анна Викторовна',          role:'student',  courseIds:['radio','navigation'] },
  { login:'teacher',  password:'1234', name:'Никитин Владимир Сергеевич',       role:'teacher',  courseIds:['stcw','safety','navigation','radio'] },
  { login:'admin',    password:'1234', name:'Администратор системы',            role:'admin',    courseIds:[] },
  { login:'superadmin', password:'1234', name:'Суперадминистратор',             role:'superadmin', courseIds:[] },
];

function getUser() { try { return JSON.parse(sessionStorage.getItem('lms_user')||'null'); } catch { return null; } }
function setUser(u){ sessionStorage.setItem('lms_user', JSON.stringify(u)); }

/* Если уже авторизован — сразу на home */
if (getUser()) window.location.href = 'home.html';

function togglePass() {
  const inp  = document.getElementById('passInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M2 2l12 12M6.5 6.7A2 2 0 0010 10M1.5 8C3 4.5 5.5 3 8 3c1 0 2 .3 2.9.7M14.5 8c-.5 1.1-1.3 2.2-2.3 3" stroke-linecap="round"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1.5 8C3 4.5 5.5 3 8 3s5 1.5 6.5 5c-1.5 3.5-4 5-6.5 5S3 11.5 1.5 8z"/><circle cx="8" cy="8" r="2"/>';
  }
}

function doLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  const errEl = document.getElementById('errorMsg');
  const errTx = document.getElementById('errorText');
  const btn   = document.getElementById('loginBtn');
  const spn   = document.getElementById('spinner');
  const btTx  = document.getElementById('loginBtnText');

  errEl.classList.remove('visible');

  if (!login) { errTx.textContent='Введите логин';  errEl.classList.add('visible'); document.getElementById('loginInput').focus(); return; }
  if (!pass)  { errTx.textContent='Введите пароль'; errEl.classList.add('visible'); document.getElementById('passInput').focus();  return; }

  btn.disabled=true; spn.style.display='block'; btTx.textContent='Проверка…';

  setTimeout(() => {
    const found = DEMO_USERS.find(u => u.login === login && u.password === pass);
    if (found) {
      setUser({ name: found.name, login: found.login, role: found.role, courseIds: found.courseIds });
      spn.style.display = 'none';
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'flex';
      setTimeout(() => { window.location.href = 'home.html'; }, 1200);
    } else {
      spn.style.display='none'; btTx.textContent='Войти в систему'; btn.disabled=false;
      errTx.textContent = 'Неверный логин или пароль';
      errEl.classList.add('visible');
      document.getElementById('passInput').value = '';
      document.getElementById('passInput').focus();
    }
  }, 900);
}
</script>
</body>
</html>
