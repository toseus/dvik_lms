<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учебный модуль — ДВИК СЭО</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ══════════════════════════════
   ШАПКА КУРСА
══════════════════════════════ */
.course-banner {
  background: var(--accent);
  color: #fff;
}
.banner-top {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 24px 14px;
}
.btn-back {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: var(--radius-sm);
  color: #fff; font-family: var(--font);
  font-size: 14px; font-weight: 600;
  cursor: pointer; flex-shrink: 0;
  transition: background .14s;
}
.btn-back:hover { background: rgba(255,255,255,0.28); }
.btn-back svg   { width:14px; height:14px; }
.banner-info    { flex:1; text-align:center; }
.banner-title   { font-size:20px; font-weight:900; line-height:1.3; margin-bottom:2px; text-shadow:0 1px 3px rgba(0,0,0,.15); }
.banner-role    { font-size:13px; opacity:.82; font-style:italic; }

/* ── Прогресс ── */
.progress-section {
  background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px;
}
.progress-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.progress-text  { font-size:15px; font-weight:700; color:var(--text-primary); }
.progress-count { font-size:14px; color:var(--text-muted); font-weight:500; }
.progress-bar-outer { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.progress-bar-inner { height:100%; background:var(--status-green); border-radius:4px; transition:width .5s ease; }

/* ══════════════════════════════
   ЦЕНТРИРОВАННЫЙ КОНТЕЙНЕР
══════════════════════════════ */
.page-center { max-width:800px; margin:0 auto; padding:0 20px; }

/* ── Описание курса ── */
.course-info {
  background: var(--card-bg); border:1px solid var(--border);
  border-radius: var(--radius); padding:16px 20px; margin:18px 0 0;
  box-shadow: var(--shadow-card); font-size:14px; line-height:1.7;
  color: var(--text-secondary);
}
.course-info strong { color:var(--text-primary); }
.course-meta-row  { display:flex; gap:24px; margin-top:10px; flex-wrap:wrap; }
.course-meta-item { font-size:13px; }
.course-meta-item strong { color:var(--text-secondary); }

/* ══════════════════════════════
   ЗАГОЛОВКИ СЕКЦИЙ ШАГОВ
══════════════════════════════ */
.steps-section   { padding:20px 0 0; }
.steps-heading   {
  font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--text-muted); margin-bottom:10px;
}

/* ── Разделитель перед практикой ── */
.practice-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0 10px;
}
.practice-divider-line { flex:1; height:1px; background:var(--border); }
.practice-divider-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--text-muted);
  white-space: nowrap;
}

/* ── Список шагов ── */
.steps-list { display:flex; flex-direction:column; gap:8px; }

/* ══════════════════════════════
   КАРТОЧКИ ШАГОВ
══════════════════════════════ */
.step-card {
  background: var(--card-bg); border:1px solid var(--border);
  border-radius: var(--radius); box-shadow:var(--shadow-card);
  overflow: hidden; transition:border-color .15s;
}
.step-card.done    { border-color:#8fcb8f; background:#f8fdf8; }
.step-card.current { border-color:var(--accent); box-shadow:0 0 0 3px rgba(15,98,174,.1),var(--shadow-card); }
.step-card.locked  { opacity:.6; background:var(--answer-bg); }

/* Практика — особый стиль: всегда видна, но "ожидает преподавателя" */
.step-card.practice-pending {
  border-color: #f0c040;
  background: #fffdf0;
}
.step-card.practice-done {
  border-color: #8fcb8f;
  background: #f8fdf8;
}

/* ══════════════════════════════
   НОВАЯ КОМПОНОВКА КАРТОЧКИ ШАГА
   ┌─────────────────────────────┐
   │ [ТИП]           [Автор] №N │  ← верхняя строка
   │ Название этапа              │  ← полная ширина
   │ [статус/подсказка] [КНОПКА]│  ← нижняя строка
   └─────────────────────────────┘
══════════════════════════════ */
.step-card-inner { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }

/* Верхняя строка: тип слева, автор+номер справа */
.step-top-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.step-type-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0;
}
.step-type-badge.online   { background:var(--accent-light);     color:var(--accent);       border:1px solid var(--accent-mid); }
.step-type-badge.pdf      { background:var(--status-red-bg);    color:var(--status-red);    border:1px solid #e8a0a3; }
.step-type-badge.test     { background:var(--status-yellow-bg); color:var(--status-yellow); border:1px solid #f0c040; }
.step-type-badge.practice { background:#fff4ce;                 color:#7a5000;              border:1px solid #e6c96d; }
.step-type-badge.upload   { background:#ede8f8;                 color:#5c3fb0;              border:1px solid #c4b3f0; }
.step-type-badge svg { width:12px; height:12px; }

.step-author-num {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text-muted); flex-shrink: 0;
}
.step-num { white-space: nowrap; font-size: 11px; }

/* Название — на всю ширину */
.step-title {
  font-size: 15px; font-weight: 700; color: var(--text-primary);
  line-height: 1.4; width: 100%;
}
.step-card.locked .step-title        { color: var(--text-muted); font-weight: 600; }
.step-card.done .step-title          { color: var(--text-secondary); }
.step-card.practice-done .step-title { color: var(--text-secondary); }

/* Нижняя строка: статус слева, кнопка справа */
.step-bottom-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.step-subtitle {
  font-size: 13px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;
}
.step-card.current .step-subtitle        { color: var(--accent);       font-weight: 600; }
.step-card.done .step-subtitle           { color: var(--status-green); font-weight: 600; }
.step-card.practice-done .step-subtitle  { color: var(--status-green); font-weight: 600; }
.step-card.practice-pending .step-subtitle { color: #7a5000; }
.step-subtitle svg { width: 12px; height: 12px; flex-shrink: 0; }

/* Кнопки */
.step-actions { flex-shrink: 0; }
.btn-step {
  display:flex; align-items:center; gap:6px;
  padding:9px 18px; border-radius:var(--radius-sm);
  font-family:var(--font); font-size:14px; font-weight:600;
  cursor:pointer; border:none; white-space:nowrap; transition:all .15s;
}
.btn-step svg { width:15px; height:15px; }

.btn-step.open {
  background:var(--accent); color:#fff;
  box-shadow:0 2px 8px rgba(15,98,174,.3);
}
.btn-step.open:hover { background:var(--accent-hover); box-shadow:0 4px 14px rgba(15,98,174,.4); transform:translateY(-1px); }

.btn-step.repeat {
  background:var(--status-green-bg); color:var(--status-green);
  border:1.5px solid #8fcb8f;
}
.btn-step.repeat:hover { background:#c0e8c0; transform:translateY(-1px); }

.btn-step.locked-btn {
  background:var(--sidebar-bg); color:var(--text-muted);
  border:1.5px solid var(--border); cursor:not-allowed;
}

/* Кнопка «Ожидает преподавателя» — не кликабельна */
.btn-step.practice-wait {
  background:#fff4ce; color:#7a5000;
  border:1.5px solid #e6c96d; cursor:default;
  font-size:13px;
}

/* Кнопка загрузки файла */
.btn-upload-label {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 18px; border-radius:var(--radius-sm);
  background:#5c3fb0; color:#fff; border:none;
  font-family:var(--font); font-size:14px; font-weight:600;
  cursor:pointer; white-space:nowrap; transition:all .15s;
  box-shadow:0 2px 8px rgba(92,63,176,.3);
}
.btn-upload-label:hover { background:#4a31a0; transform:translateY(-1px); box-shadow:0 4px 14px rgba(92,63,176,.4); }
.btn-upload-label svg { width:15px; height:15px; }
.btn-upload-label input { display:none; }

/* Зона загруженного файла под карточкой */
.upload-status {
  display:none; border-top:1px solid var(--border);
  padding:11px 18px; background:var(--answer-hover);
  align-items:center; gap:10px; flex-wrap:wrap;
}
.upload-status.visible { display:flex; }
.upload-file-icon { font-size:22px; flex-shrink:0; }
.upload-file-info { flex:1; min-width:0; }
.upload-file-name { font-size:13px; font-weight:600; color:var(--text-primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.upload-file-size { font-size:11px; color:var(--text-muted); margin-top:1px; }
.upload-awaiting  { font-size:12px; color:#7a5000; display:flex; align-items:center; gap:5px; margin-top:3px; font-weight:500; }
.btn-remove-file  { padding:4px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:#fff; color:var(--status-red); font-family:var(--font); font-size:12px; cursor:pointer; transition:background .13s; flex-shrink:0; }
.btn-remove-file:hover { background:var(--status-red-bg); }

/* ── Строка подтверждения (online/pdf) ── */
.step-confirm {
  display:none; background:var(--answer-hover);
  border-top:1px solid var(--border);
  padding:12px 18px; align-items:center; gap:12px; flex-wrap:wrap;
}
.step-confirm.visible { display:flex; }
.step-confirm-text    { flex:1; font-size:14px; color:var(--text-secondary); }
.step-confirm-text strong { color:var(--text-primary); }

.btn-mark-done {
  display:flex; align-items:center; gap:6px;
  padding:8px 18px; border-radius:var(--radius-sm);
  background:var(--status-green); color:#fff; border:none;
  font-family:var(--font); font-size:14px; font-weight:600;
  cursor:pointer; box-shadow:0 2px 6px rgba(16,124,16,.3); transition:all .15s; white-space:nowrap;
}
.btn-mark-done:hover { background:#0d660d; transform:translateY(-1px); }
.btn-mark-done svg   { width:14px; height:14px; }

/* ══════════════════════════════
   КНОПКА ЗАВЕРШИТЬ
══════════════════════════════ */
.finish-section { padding:24px 0 40px; }
.finish-card {
  background:var(--card-bg); border:2px dashed var(--border);
  border-radius:var(--radius); padding:24px; text-align:center; transition:border-color .3s,background .3s;
}
.finish-card.ready { border-color:var(--status-green); background:var(--status-green-bg); animation:finishPulse .5s ease; }
@keyframes finishPulse { 0%{transform:scale(1)} 40%{transform:scale(1.015)} 100%{transform:scale(1)} }
.finish-emoji  { font-size:42px; margin-bottom:10px; }
.finish-title  { font-size:18px; font-weight:700; color:var(--text-primary); margin-bottom:6px; }
.finish-desc   { font-size:14px; color:var(--text-muted); margin-bottom:20px; }
.btn-finish {
  display:inline-flex; align-items:center; gap:8px;
  padding:13px 32px; background:var(--status-green); color:#fff;
  border:none; border-radius:var(--radius-sm);
  font-family:var(--font); font-size:16px; font-weight:700;
  cursor:pointer; box-shadow:0 2px 12px rgba(16,124,16,.35); transition:all .15s;
}
.btn-finish:hover:not(:disabled) { background:#0d660d; box-shadow:0 4px 18px rgba(16,124,16,.45); transform:translateY(-2px); }
.btn-finish:disabled { opacity:.35; cursor:not-allowed; transform:none!important; box-shadow:none!important; }
.btn-finish svg { width:18px; height:18px; }

/* ══════════════════════════════
   МОДАЛ ЗАВЕРШЕНИЯ
══════════════════════════════ */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,30,60,.55); z-index:500; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(3px); }
.modal-overlay.visible { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:0 12px 48px rgba(0,0,0,.2); padding:36px 32px 32px; width:100%; max-width:420px; text-align:center; animation:modalIn .25s ease; }
@keyframes modalIn { from{transform:scale(.94);opacity:0} to{transform:none;opacity:1} }
.modal-icon  { font-size:60px; margin-bottom:14px; }
.modal-title { font-size:24px; font-weight:900; color:var(--text-primary); margin-bottom:8px; }
.modal-text  { font-size:15px; color:var(--text-muted); margin-bottom:26px; line-height:1.6; }
.modal-btns  { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

/* ── Адаптив ── */
@media (max-width:640px) {
  .banner-title  { font-size:15px; }
  .banner-top    { padding:12px 14px; gap:8px; }
  .step-card-inner { padding:11px 13px; gap:7px; }
  .step-title    { font-size:14px; }
  .btn-step      { padding:8px 13px; font-size:13px; }
  .btn-upload-label { padding:8px 13px; font-size:13px; }
  .finish-section { padding:20px 0 28px; }
  .progress-section { padding:11px 14px; }
  .course-info   { padding:13px 14px; }
  .step-author-num { display:none; }
  .modal-card    { padding:26px 18px 22px; }
  .modal-title   { font-size:19px; }
  .page-center   { padding:0 12px; }
}
@media (max-width:420px) {
  .btn-back span { display:none; }
  .btn-back { padding:8px 12px; }
}
</style>
</head>
<body>

<!-- ШАПКА -->
<header class="app-header">
  <div class="logo-icon">📚</div>
  <span class="app-title">ДВИК — Обучение</span>
  <div class="header-right">
    <div class="header-user">
      <div class="header-user-avatar" id="headerUserAvatar">—</div>
      <div class="header-user-info">
        <span class="header-user-name" id="headerUserName">—</span>
        <span class="header-user-role" id="headerUserRole">Слушатель</span>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Выход</span>
    </button>
  </div>
</header>

<main id="pageContent"></main>

<!-- МОДАЛ -->
<div class="modal-overlay" id="finishModal">
  <div class="modal-card">
    <div class="modal-icon">🏆</div>
    <div class="modal-title">Обучение завершено!</div>
    <div class="modal-text" id="modalText">Поздравляем с завершением курса!</div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="window.location.href='home.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 8l6-5 6 5v7H10V11H6v4H2V8z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        В личный кабинет
      </button>
      <button class="btn btn-outline" onclick="document.getElementById('finishModal').classList.remove('visible')">Остаться</button>
    </div>
  </div>
</div>

<footer class="status-bar">
  <span class="status-dot">●</span>
  <span id="footerCourseName">Учебный модуль</span>
  <span style="margin-left:auto" id="footerProgress"></span>
</footer>

<script>
/* ══════════════════════════════════════════════════
   АВТОНОМНЫЙ БЛОК ДАННЫХ И ФУНКЦИЙ
══════════════════════════════════════════════════ */

/* ── Пользователь ── */
function getUser()  { try{return JSON.parse(sessionStorage.getItem('lms_user')||'null');}catch{return null;} }
function logout()   { sessionStorage.clear(); window.location.href='login.html'; }
function fillHeader() {
  const u = getUser();
  const name = u ? u.name : '';
  const parts = name.split(' ');
  const init  = parts.map(p=>p[0]).join('').slice(0,2).toUpperCase();
  const av=document.getElementById('headerUserAvatar'); if(av) av.textContent=init||'—';
  const nm=document.getElementById('headerUserName');  if(nm) nm.textContent=name||'—';
  const rl=document.getElementById('headerUserRole');
  if(rl) rl.textContent = ({student:'Слушатель',teacher:'Преподаватель',admin:'Администратор'}[(u||{}).role])||'Слушатель';
}

/* ── Текущий курс ── */
function getActiveCourse() { return sessionStorage.getItem('lms_active_course'); }

/* ── Состояние прохождения (с поддержкой нескольких логинов) ── */
function _sk(login) { return 'lms_state_'+(login||((getUser()||{}).login)||'anon'); }
function getLmsState(login)    { try{return JSON.parse(sessionStorage.getItem(_sk(login))||'{}');}catch{return{};} }
function saveLmsState(s,login) { sessionStorage.setItem(_sk(login),JSON.stringify(s)); }
function isStepDone(cid,idx,login) {
  const s=getLmsState(login||(getUser()||{}).login);
  return !!(s[cid]&&s[cid][idx]);
}
function markStepDone(cid,idx,login) {
  const key=login||(getUser()||{}).login;
  const s=getLmsState(key);
  if(!s[cid])s[cid]={};
  s[cid][idx]=true;
  saveLmsState(s,key);
}

/* ── Зачёты практических занятий ── */
function getPracticeState()   { try{return JSON.parse(sessionStorage.getItem('lms_practice')||'{}');}catch{return{};} }
function isPracticeGraded(cid,idx,login) {
  return !!(getPracticeState()[cid+'__'+idx+'__'+(login||(getUser()||{}).login)]);
}

/* ════════════════════════════════════
   ДАННЫЕ КУРСОВ (синхронизированы с script.js)
════════════════════════════════════ */
const COURSES = [
  {
    id:'stcw', short:'ПДНВ',
    title:'Подготовка, оценка компетентности и дипломирование моряков',
    author:'Кафедра морского права и менеджмента',
    description:'В соответствии с требованиями правила I/6 Конвенции ПДНВ лица, ответственные за подготовку и оценку компетентности моряков, должны иметь надлежащую квалификацию.',
    assignedDate:'05.02.2026',
    steps:[
      {type:'online',  title:'Общие положения и введение в курс',              role:'Экзаменатор', url:'https://example.com/stcw/1'},
      {type:'online',  title:'Пересмотренная конвенция ПДНВ, 1995 год',        role:'Экзаменатор', url:'https://example.com/stcw/2'},
      {type:'online',  title:'Требования к подготовке и дипломированию',       role:'Экзаменатор', url:'https://example.com/stcw/3'},
      {type:'online',  title:'Международные обязательства государств',          role:'Экзаменатор', url:'https://example.com/stcw/4'},
      {type:'online',  title:'Полномочия государств и организаций',             role:'Экзаменатор', url:'https://example.com/stcw/5'},
      {type:'online',  title:'Система качества подготовки',                    role:'Экзаменатор', url:'https://example.com/stcw/6'},
      {type:'online',  title:'Профессиональные дипломы и документы',            role:'Экзаменатор', url:'https://example.com/stcw/7'},
      {type:'online',  title:'Стандарты компетентности',                       role:'Экзаменатор', url:'https://example.com/stcw/8'},
      {type:'pdf',     title:'Методические материалы по оценке компетентности', role:'Инструктор',  url:'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf'},
      {type:'online',  title:'Нормативно-правовое регулирование',              role:'Экзаменатор', url:'https://example.com/stcw/10'},
      {type:'online',  title:'Организация процесса подготовки',                role:'Экзаменатор', url:'https://example.com/stcw/11'},
      {type:'online',  title:'Документирование результатов оценки',            role:'Экзаменатор', url:'https://example.com/stcw/12'},

fillHeader();

const ME       = getUser() || {};
const courseId = getActiveCourse() || COURSES[0].id;
const course   = getCourseById(courseId) || COURSES[0];
const myLogin  = ME.login || 'anon';

/* ── Разделить шаги на обычные, практику и тест ── */
const normalSteps   = course.steps.map((s,i)=>({...s,idx:i})).filter(s=>s.type!=='practice'&&s.type!=='upload'&&s.type!=='test');
const practiceSteps = course.steps.map((s,i)=>({...s,idx:i})).filter(s=>s.type==='practice'||s.type==='upload');
const testStep      = course.steps.map((s,i)=>({...s,idx:i})).find(s=>s.type==='test');

/* ── Статус обычного шага (sequential lock) ── */
function getNormalStepStatus(step) {
  if (isStepDone(courseId, step.idx, myLogin)) return 'done';
  // Заблокирован если хотя бы один предыдущий обычный шаг не пройден
  for (const prev of normalSteps) {
    if (prev.idx >= step.idx) break;
    if (!isStepDone(courseId, prev.idx, myLogin)) return 'locked';
  }
  return 'current';
}

/* ── Статус теста: доступен если все обычные шаги пройдены ИЛИ все практики зачтены ── */
function getTestStatus() {
  if (!testStep) return 'none';
  if (isStepDone(courseId, testStep.idx, myLogin)) return 'done';

  const allNormalDone   = normalSteps.every(s => isStepDone(courseId, s.idx, myLogin));
  const allPracticeDone = practiceSteps.length === 0 ||
                          practiceSteps.every(s => isPracticeGraded(courseId, s.idx, myLogin));

  // Тест доступен если все обычные пройдены И (практик нет ИЛИ все практики зачтены)
  if (allNormalDone && allPracticeDone) return 'current';
  // Если практики зачтены но не все обычные — тоже открываем (практика пропускает очередь)
  if (allPracticeDone && practiceSteps.length > 0) return 'current';
  return 'locked';
}

/* ── Хранилище загруженных файлов: ключ = courseId+'__'+stepIdx ── */
function getUploadState() { try{return JSON.parse(sessionStorage.getItem('lms_uploads_'+myLogin)||'{}');}catch{return{};} }
function saveUploadState(s){ sessionStorage.setItem('lms_uploads_'+myLogin, JSON.stringify(s)); }
function getUploadedFile(stepIdx) { return getUploadState()[courseId+'__'+stepIdx]||null; }
function setUploadedFile(stepIdx, meta) { const s=getUploadState(); s[courseId+'__'+stepIdx]=meta; saveUploadState(s); }
function removeUploadedFile(stepIdx) { const s=getUploadState(); delete s[courseId+'__'+stepIdx]; saveUploadState(s); }

/* ── Обработчик выбора файла ── */
function handleUpload(stepIdx, input) {
  const file = input.files[0]; if (!file) return;
  const allowed = ['application/pdf','application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
  if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|doc|docx)$/i)) {
    alert('Допустимые форматы: PDF, DOC, DOCX'); return;
  }
  const meta = { name: file.name, size: file.size, type: file.type, date: new Date().toLocaleDateString('ru-RU') };
  setUploadedFile(stepIdx, meta);
  input.value = '';
  renderPage();
}

function removeUpload(stepIdx) {
  removeUploadedFile(stepIdx);
  renderPage();
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes+' Б';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1)+' КБ';
  return (bytes/1024/1024).toFixed(1)+' МБ';
}

/* ── Открыть шаг ── */
function openStep(idx) {
  const step = course.steps[idx];
  if (!step) return;
  if (step.type === 'test') {
    sessionStorage.setItem('questReturn', JSON.stringify({ courseId, stepIdx: idx }));
    window.location.href = step.url;
    return;
  }
  window.open(step.url, '_blank');
  const confirmEl = document.getElementById('confirm-'+idx);
  if (confirmEl) confirmEl.classList.add('visible');
}

function confirmStep(idx) {
  markStepDone(courseId, idx, myLogin);
  const confirmEl = document.getElementById('confirm-'+idx);
  if (confirmEl) confirmEl.classList.remove('visible');
  renderPage();
}

function finishCourse() {
  document.getElementById('modalText').innerHTML =
    'Вы успешно завершили курс<br><strong>«'+course.title+'»</strong>.<br>Поздравляем!';
  document.getElementById('finishModal').classList.add('visible');
}

   │ [ТИП]          [Автор]  Шаг N │
   │ Название этапа на всю ширину   │
   │ [статус/подсказка]   [КНОПКА] │
   └────────────────────────────────┘
════════════════════════════════════ */
function buildStepCard(step, cardClass, typeLabel, subtitleHtml, actionHtml, extraHtml, stepNum) {
  return `
  <div class="step-card ${cardClass}" id="step-${step.idx}">
    <div class="step-card-inner">
      <div class="step-top-row">
        <div class="step-type-badge ${step.type}">
          ${ICO[step.type]||''} ${typeLabel}
        </div>
        <div class="step-author-num">
          <span style="font-size:12px;color:var(--text-muted)">${step.role}</span>
          <span class="step-num">Шаг ${stepNum}</span>
        </div>
      </div>
      <div class="step-title">${step.title}</div>
      <div class="step-bottom-row">
        ${subtitleHtml}
        <div class="step-actions">${actionHtml}</div>
      </div>
    </div>
    ${extraHtml}
  </div>`;
}

/* ── Рендер страницы ── */
function renderPage() {
  const s = getLmsState(myLogin);
  const doneCount = s[courseId] ? Object.keys(s[courseId]).length : 0;
  const total     = course.steps.length;
  const pct       = total ? Math.round(doneCount/total*100) : 0;
  const allNormalDone   = normalSteps.every(st => isStepDone(courseId, st.idx, myLogin));
  const allPracticeDone = (practiceSteps.length===0) ||
    practiceSteps.every(st => isPracticeGraded(courseId, st.idx, myLogin));
  const testSt  = getTestStatus();
  const testDone = testStep && isStepDone(courseId, testStep.idx, myLogin);
  const allDone  = testDone || (allNormalDone && allPracticeDone && !testStep);

  document.getElementById('footerCourseName').textContent = course.title;
  document.getElementById('footerProgress').textContent   = doneCount+' / '+total+' шагов';

  /* ── Обычные шаги ── */
  let stepNum = 0;
  const ICO_OPEN = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 3h7a1 1 0 011 1v7a1 1 0 01-1 1H5" stroke-linecap="round"/><path d="M10 8H1M7 5l3 3-3 3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  const normalHtml = normalSteps.map(step => {
    stepNum++;
    const st = getNormalStepStatus(step);
    let cardCls, subtitle, action, extra='';

    if (st==='done') {
      cardCls  = 'done';
      subtitle = '<div class="step-subtitle">'+ICO.done+' Завершено</div>';
      action   = '<button class="btn-step repeat" onclick="openStep('+step.idx+')">'+ICO.repeat+' Повторить</button>';
    } else if (st==='current') {
      cardCls  = 'current';
      subtitle = '<div class="step-subtitle">'+ICO.current+' Текущий этап</div>';
      action   = '<button class="btn-step open" onclick="openStep('+step.idx+')">'+ICO_OPEN+' Открыть</button>';
      if (step.type!=='test') {
        extra = `<div class="step-confirm" id="confirm-${step.idx}">
          <div class="step-confirm-text">Вы изучили материал <strong>«${step.title}»</strong>?</div>
          <button class="btn-mark-done" onclick="confirmStep(${step.idx})">${ICO.done} Отметить завершённым</button>
        </div>`;
      }
    } else {
      cardCls  = 'locked';
      subtitle = '<div class="step-subtitle">'+ICO.locked+' Заблокировано</div>';
      action   = '<button class="btn-step locked-btn" disabled>'+ICO.locked+' Недоступно</button>';
    }
    return buildStepCard(step, cardCls, step.type==='pdf'?'PDF':'ОНЛАЙН', subtitle, action, extra, stepNum);
  }).join('');

  /* ── Практические занятия + Загрузка ── */
  let practiceHtml = '';
  if (practiceSteps.length > 0) {
    const cards = practiceSteps.map(step => {
      stepNum++;
      const graded   = isPracticeGraded(courseId, step.idx, myLogin);
      const uploaded = step.type==='upload' ? getUploadedFile(step.idx) : null;
      let cardCls, subtitle, action, extra='';

      if (step.type === 'upload') {
        /* — ЗАГРУЗКА — */
        if (graded) {
          cardCls  = 'practice-done';
          subtitle = '<div class="step-subtitle">'+ICO.done+' Принято преподавателем</div>';
          action   = '<span class="btn-step practice-wait" style="background:var(--status-green-bg);color:var(--status-green);border-color:#8fcb8f">'+ICO.done+' Принято</span>';
        } else if (uploaded) {
          cardCls  = 'practice-pending';
          subtitle = '<div class="step-subtitle">'+ICO.clock+' Файл загружен, ожидает проверки</div>';
          action   = `<label class="btn-upload-label" style="background:#5c3fb0;opacity:.75;cursor:default" title="Файл уже загружен">${ICO.upload} Загружено
            <input type="file" accept=".pdf,.doc,.docx" onchange="handleUpload(${step.idx},this)" style="display:none"></label>`;
          extra = `<div class="upload-status visible">
            <div class="upload-file-icon">${uploaded.name.endsWith('.pdf')?'📄':'📝'}</div>
            <div class="upload-file-info">
              <div class="upload-file-name">${uploaded.name}</div>
              <div class="upload-file-size">${fmtSize(uploaded.size)} · загружено ${uploaded.date}</div>
              <div class="upload-awaiting">${ICO.clock} Ожидает проверки преподавателем</div>
            </div>
            <button class="btn-remove-file" onclick="removeUpload(${step.idx})">✕ Удалить</button>
          </div>`;
        } else {
          cardCls  = 'practice-pending';
          subtitle = '<div class="step-subtitle">'+ICO.upload.replace('stroke="#9a6300"','stroke="#5c3fb0"')+' Загрузите файл для проверки · 📅 '+(step.date||'')+'</div>';
          action   = `<label class="btn-upload-label">${ICO.upload} Загрузить работу
            <input type="file" accept=".pdf,.doc,.docx" onchange="handleUpload(${step.idx},this)">
          </label>`;
        }
        return buildStepCard(step, cardCls, 'ЗАГРУЗКА', subtitle, action, extra, stepNum);

      } else {
        /* — ПРАКТИКА — */
        if (graded) {
          cardCls  = 'practice-done';
          subtitle = '<div class="step-subtitle">'+ICO.done+' Зачтено преподавателем</div>';
          action   = '<span class="btn-step practice-wait" style="background:var(--status-green-bg);color:var(--status-green);border-color:#8fcb8f">'+ICO.done+' Зачтено</span>';
        } else {
          cardCls  = 'practice-pending';
          subtitle = '<div class="step-subtitle">'+ICO.clock+' Ожидает зачёта · 📅 '+step.date+'</div>';
          action   = '<span class="btn-step practice-wait">'+ICO.clock+' Ожидает преподавателя</span>';
        }
        return buildStepCard(step, cardCls, 'ПРАКТИКА', subtitle, action, '', stepNum);
      }
    }).join('');

    practiceHtml = `
    <div class="practice-divider">
      <div class="practice-divider-line"></div>
      <div class="practice-divider-label">📋 Практические занятия и задания</div>
      <div class="practice-divider-line"></div>
    </div>
    <div class="steps-list">${cards}</div>`;
  }

  /* ── Итоговый тест ── */
  let testHtml = '';
  if (testStep) {
    stepNum++;
    let cardCls, subtitle, action;
    if (testDone) {
      cardCls  = 'done';
      subtitle = '<div class="step-subtitle">'+ICO.done+' Пройдено</div>';
      action   = '<button class="btn-step repeat" onclick="openStep('+testStep.idx+')">'+ICO.repeat+' Пройти снова</button>';
    } else if (testSt==='current') {
      cardCls  = 'current';
      subtitle = '<div class="step-subtitle">'+ICO.current+' Итоговая аттестация доступна</div>';
      action   = '<button class="btn-step open" onclick="openStep('+testStep.idx+')">'+ICO_OPEN+' Начать тест</button>';
    } else {
      const why = !allNormalDone ? 'Завершите обязательные этапы' : 'Ожидает зачёта практических заданий';
      cardCls  = 'locked';
      subtitle = '<div class="step-subtitle">'+ICO.locked+' '+why+'</div>';
      action   = '<button class="btn-step locked-btn" disabled>'+ICO.locked+' Недоступно</button>';
    }
    testHtml = `
    <div class="practice-divider">
      <div class="practice-divider-line"></div>
      <div class="practice-divider-label">🎓 Итоговая аттестация</div>
      <div class="practice-divider-line"></div>
    </div>
    <div class="steps-list">${buildStepCard(testStep, cardCls, 'ТЕСТ', subtitle, action, '', stepNum)}</div>`;
  }

  /* ── Статус ── */
  const statusColor = pct===100?'var(--status-green)':pct>0?'var(--status-yellow)':'var(--text-muted)';
  const statusLabel = pct===100?'Завершён':pct>0?('В процессе ('+pct+'%)' ):'Назначен';

  /* ── Финиш ── */
  const finishCard = `
  <div class="finish-card${allDone?' ready':''}" id="finishCard">
    <div class="finish-emoji">${allDone?'🏆':'🎯'}</div>
    <div class="finish-title">${allDone?'Все этапы пройдены!':'Завершите все этапы'}</div>
    <div class="finish-desc">${allDone?'Вы успешно прошли все материалы курса.':'Пройдите все шаги программы, чтобы получить отметку о завершении.'}</div>
    <button class="btn-finish"${allDone?'':' disabled'} onclick="finishCourse()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l4 4 6-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Завершить обучение
    </button>
  </div>`;

  document.getElementById('pageContent').innerHTML = `
    <div class="course-banner">
      <div class="banner-top">
        <button class="btn-back" onclick="window.location.href='home.html'">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Назад</span>
        </button>
        <div class="banner-info">
          <div class="banner-title">${course.title}</div>
          <div class="banner-role">${course.short} · ${course.author}</div>
        </div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span class="progress-text">Прогресс обучения</span>
        <span class="progress-count">${doneCount} из ${total} шагов</span>
      </div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
    </div>

    <div class="page-center">
      <div class="course-info">
        <strong>Описание:</strong> ${course.description}
        <div class="course-meta-row">
          <div class="course-meta-item"><strong>Назначена:</strong> ${course.assignedDate}</div>
          <div class="course-meta-item"><strong>Статус:</strong> <span style="color:${statusColor}">${statusLabel}</span></div>
        </div>
      </div>
      <div class="steps-section">
        <div class="steps-heading">Обязательные этапы</div>
        <div class="steps-list">${normalHtml}</div>
        ${practiceHtml}
        ${testHtml}
      </div>
      <div class="finish-section">${finishCard}</div>
    </div>`;
}

/* ── Вернулись из теста? ── */
(function() {
  const raw = sessionStorage.getItem('questReturn');
  if (!raw) return;
  try {
    const obj = JSON.parse(raw);
    if (obj.courseId===courseId && obj.completed && !isStepDone(courseId, obj.stepIdx, myLogin)) {
      markStepDone(courseId, obj.stepIdx, myLogin);
    }
  } catch {}
  sessionStorage.removeItem('questReturn');
})();

renderPage();
</script>
</body>
</html>
