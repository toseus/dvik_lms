<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ step.title }} — ДВИК СЭО</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@300;400;600;700;900&family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   ДВИК СЭО — Слайды модуля (морская тема, standalone)
══════════════════════════════════════════════════ */
:root {
  --navy: #0a1628;
  --deep-blue: #112240;
  --ocean: #1a3a5c;
  --steel: #2d5078;
  --sky: #3a7bd5;
  --accent: #e8a838;
  --accent-light: #f0c060;
  --accent-dark: #c08020;
  --white: #f0f4f8;
  --light: #ccd6e0;
  --muted: #8899aa;
  --success: #4caf50;
  --danger: #ef5350;
  --card-bg: rgba(17,34,64,0.85);
  --card-border: rgba(58,123,213,0.2);
  --radius: 16px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Literata', 'Source Sans Pro', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --vh: 1vh;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-body);
  color: var(--white);
  background: var(--navy);
  min-height: 100vh;
  min-height: calc(var(--vh, 1vh) * 100);
  overflow: hidden;
}

/* ── Background pattern ── */
.bg-pattern {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(58,123,213,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(232,168,56,0.08) 0%, transparent 50%);
}
.bg-pattern::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233a7bd5' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity: 0.5;
}

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; gap: 16px;
  background: rgba(10,22,40,0.85);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--card-border);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--sky), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.header-title { font-family: var(--font-heading); font-size: 16px; font-weight: 700; color: var(--white); }
.header-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

.progress-area { display: flex; align-items: center; gap: 12px; min-width: 200px; }
.progress-bar { flex: 1; height: 6px; background: var(--deep-blue); border-radius: 3px; overflow: hidden; border: 1px solid var(--card-border); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--sky), var(--accent)); border-radius: 3px; transition: width 0.5s ease; width: 0%; }
.progress-text { font-size: 12px; color: var(--muted); font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ── Slides viewport ── */
.slides-viewport {
  position: fixed; top: 68px; left: 0; right: 0; bottom: 52px;
  overflow: hidden; z-index: 1;
}

.slide {
  position: absolute; inset: 0;
  display: flex; align-items: flex-start; justify-content: center;
  opacity: 0; transform: translateX(60px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none; overflow-y: auto;
  padding: 40px 24px 60px;
}
.slide.active {
  opacity: 1; transform: translateX(0);
  pointer-events: auto;
}
.slide.exit-left {
  opacity: 0; transform: translateX(-60px);
  pointer-events: none;
}

.slide-inner {
  max-width: 720px; width: 100%;
  animation: fade-up 0.6s ease both;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Slide content components ── */
.slide-tag {
  display: inline-block;
  background: var(--accent); color: var(--navy);
  padding: 4px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px;
}

.slide-heading {
  font-family: var(--font-heading);
  font-size: 36px; font-weight: 900; line-height: 1.2;
  color: var(--white); margin-bottom: 16px;
}
.slide-heading .accent { color: var(--accent); }

.slide-text {
  font-size: 17px; line-height: 1.7; color: var(--light);
  margin-bottom: 20px;
}
.slide-text strong { color: var(--white); font-weight: 600; }

/* Cards */
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin: 20px 0;
}
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 20px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
.card-icon { font-size: 32px; margin-bottom: 12px; }
.card h3 { font-family: var(--font-heading); font-size: 18px; margin-bottom: 8px; color: var(--white); }
.card p { font-size: 14px; color: var(--light); line-height: 1.5; }

/* Definitions */
.def-list { margin: 20px 0; display: flex; flex-direction: column; gap: 12px; }
.def-item {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 16px 18px;
  border-left: 3px solid var(--accent);
}
.def-term {
  font-family: var(--font-mono); font-size: 15px; font-weight: 700;
  color: var(--accent); margin-bottom: 4px;
}
.def-desc { font-size: 14px; color: var(--light); line-height: 1.5; }

/* Levels */
.level-row { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
.level-badge {
  flex: 1; min-width: 140px; padding: 16px;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); text-align: center;
  transition: transform 0.2s;
}
.level-badge:hover { transform: translateY(-2px); }
.level-badge.l1 { border-color: var(--success); }
.level-badge.l2 { border-color: var(--accent); }
.level-badge.l3 { border-color: var(--danger); }
.level-num {
  font-size: 28px; font-weight: 900; font-family: var(--font-heading);
  color: var(--accent); margin-bottom: 4px;
}
.level-badge.l1 .level-num { color: var(--success); }
.level-badge.l3 .level-num { color: var(--danger); }
.level-name { font-size: 14px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
.level-desc { font-size: 12px; color: var(--muted); }

/* Info box */
.info-box {
  display: flex; gap: 12px; padding: 16px 18px;
  background: rgba(58,123,213,0.12); border: 1px solid rgba(58,123,213,0.25);
  border-radius: var(--radius-sm); margin: 20px 0;
}
.info-box-icon { font-size: 24px; flex-shrink: 0; }
.info-box p { font-size: 14px; color: var(--light); line-height: 1.5; }
.info-box p strong { color: var(--accent); }

/* Confirm button */
.confirm-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; margin-top: 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: var(--navy); border: none; border-radius: 30px;
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(232,168,56,0.3);
}
.confirm-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(232,168,56,0.4);
}
.confirm-btn svg { width: 20px; height: 20px; }

/* ── Quiz overlay ── */
.quiz-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,22,40,0.9);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  padding: 20px;
}
.quiz-overlay.visible { opacity: 1; pointer-events: auto; }

.quiz-card {
  background: var(--deep-blue); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 28px 32px;
  max-width: 560px; width: 100%;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}

.quiz-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.quiz-icon { font-size: 36px; }
.quiz-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.quiz-title { font-size: 14px; color: var(--accent); font-weight: 600; }

.quiz-question {
  font-family: var(--font-heading); font-size: 20px; font-weight: 700;
  color: var(--white); line-height: 1.4; margin-bottom: 20px;
}

.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--card-bg);
  border: 1.5px solid var(--card-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.15s; font-size: 15px; color: var(--light);
}
.quiz-option:hover:not(.disabled) { border-color: var(--sky); background: rgba(58,123,213,0.15); }
.quiz-option .opt-letter {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ocean); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--muted); flex-shrink: 0;
}
.quiz-option.correct { border-color: var(--success); background: rgba(76,175,80,0.15); }
.quiz-option.correct .opt-letter { background: var(--success); color: #fff; }
.quiz-option.wrong { border-color: var(--danger); background: rgba(239,83,80,0.15); }
.quiz-option.wrong .opt-letter { background: var(--danger); color: #fff; }
.quiz-option.disabled { pointer-events: none; opacity: 0.7; }

.quiz-feedback {
  margin-top: 16px; padding: 12px 16px;
  border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.success { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: var(--success); }
.quiz-feedback.fail { background: rgba(239,83,80,0.12); border: 1px solid rgba(239,83,80,0.25); color: var(--danger); }

.quiz-next-btn, .quiz-retry-btn {
  display: none; margin-top: 16px; padding: 12px 24px;
  border: none; border-radius: 24px;
  font-family: var(--font-body); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.quiz-next-btn { background: var(--accent); color: var(--navy); }
.quiz-next-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(232,168,56,0.3); }
.quiz-retry-btn { background: var(--ocean); color: var(--light); border: 1px solid var(--card-border); }
.quiz-retry-btn:hover { background: var(--steel); }
.quiz-next-btn.show, .quiz-retry-btn.show { display: inline-flex; }

/* ── Footer nav ── */
.footer-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 20px 12px; gap: 6px;
  background: rgba(10,22,40,0.9);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--card-border);
}

.slide-dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.slide-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--ocean); border: 1.5px solid var(--steel);
  cursor: pointer; transition: all 0.2s;
}
.slide-dot:hover { transform: scale(1.3); }
.slide-dot.active { background: var(--accent); border-color: var(--accent); transform: scale(1.2); }
.slide-dot.completed { background: var(--success); border-color: var(--success); }

.nav-hint { font-size: 11px; color: var(--muted); text-align: center; }

/* ── Completion slide ── */
.completion-text {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; min-height: 60vh;
}
.completion-circle {
  width: 100px; height: 100px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; margin-bottom: 24px;
  box-shadow: 0 8px 32px rgba(232,168,56,0.3);
  animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 8px 32px rgba(232,168,56,0.3); }
  50% { box-shadow: 0 8px 48px rgba(232,168,56,0.5); }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .header { padding: 10px 16px; }
  .header-title { font-size: 14px; }
  .header-subtitle { display: none; }
  .progress-area { min-width: 120px; }
  .slide { padding: 24px 16px 60px; }
  .slide-heading { font-size: 26px; }
  .slide-text { font-size: 15px; }
  .card-grid { grid-template-columns: 1fr; }
  .level-row { flex-direction: column; }
  .quiz-card { padding: 20px; }
  .quiz-question { font-size: 17px; }
}
</style>
</head>
<body>
<div class="bg-pattern"></div>

<header class="header">
  <div class="header-left">
    <div class="logo-icon">⚓</div>
    <div>
      <div class="header-title">{{ step.title }}</div>
      <div class="header-subtitle">{{ module.program.code }} · {{ module.title }}</div>
    </div>
  </div>
  <div class="progress-area">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / {{ total_slides }}</div>
  </div>
</header>

<div class="slides-viewport" id="slidesViewport"></div>

<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-card">
    <div class="quiz-header">
      <div class="quiz-icon">🎯</div>
      <div>
        <div class="quiz-label">Контрольный вопрос</div>
        <div class="quiz-title" id="quizSlideLabel"></div>
      </div>
    </div>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next-btn" id="quizNextBtn" onclick="nextSlide()">Далее →</button>
    <button class="quiz-retry-btn" id="quizRetryBtn" onclick="retryQuiz()">Попробовать снова</button>
  </div>
</div>

<footer class="footer-nav">
  <div class="slide-dots" id="slideDots"></div>
  <div class="nav-hint">Изучите слайд → ответьте на вопрос → переход далее</div>
</footer>

<!-- Данные из Django — через script type=application/json (не исполняется браузером, безопасно для HTML внутри JSON) -->
<script id="slidesJson" type="application/json">{{ slides_json|safe }}</script>
<div id="moduleInfo" data-module-id="{{ module.pk }}" data-step-id="{{ step.pk }}" style="display:none;"></div>

{% verbatim %}
<script>
// ══════════════════════════════════════════════════
//  Получение данных из Django
// ══════════════════════════════════════════════════
const SLIDES_DATA = JSON.parse(document.getElementById('slidesJson').textContent);
const infoEl = document.getElementById('moduleInfo');
const STEP_ID = infoEl.dataset.stepId;
const MODULE_ID = infoEl.dataset.moduleId;
const TOTAL_SLIDES = SLIDES_DATA.length + 1; // +1 для финального слайда
let currentSlide = 0;
const completedSlides = new Set();
const LETTERS = ['\u0410','\u0411','\u0412','\u0413','\u0414','\u0415','\u0416','\u0417']; // А Б В Г Д Е Ж З

function getCSRF() {
  const m = document.cookie.match(/(?:^|;\s*)csrftoken_lms=([^;]*)/);
  return m ? decodeURIComponent(m[1]) : '';
}

// ══════════════════════════════════════════════════
//  Генерация слайдов из данных
// ══════════════════════════════════════════════════
function buildSlides() {
  const vp = document.getElementById('slidesViewport');
  let html = '';

  SLIDES_DATA.forEach(function(slide, i) {
    var btnHtml = slide.quiz
      ? '<button class="confirm-btn" onclick="showQuiz(' + i + ')">\u041c\u0430\u0442\u0435\u0440\u0438\u0430\u043b \u0438\u0437\u0443\u0447\u0435\u043d <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg></button>'
      : '<button class="confirm-btn" onclick="completeAndNext(' + i + ')">\u0414\u0430\u043b\u0435\u0435 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg></button>';

    html += '<div class="slide' + (i === 0 ? ' active' : '') + '" data-index="' + i + '">' +
      '<div class="slide-inner">' + slide.content + btnHtml + '</div></div>';
  });

  // Финальный слайд
  html += '<div class="slide" data-index="' + SLIDES_DATA.length + '">' +
    '<div class="slide-inner">' +
    '<div class="completion-text">' +
    '<div class="completion-circle">\ud83c\udf89</div>' +
    '<div class="slide-tag">\u041c\u043e\u0434\u0443\u043b\u044c \u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d</div>' +
    '<h1 class="slide-heading" style="text-align:center;">\u041f\u043e\u0437\u0434\u0440\u0430\u0432\u043b\u044f\u0435\u043c!</h1>' +
    '<p class="slide-text" style="margin:0 auto;text-align:center;">\u0412\u044b \u0443\u0441\u043f\u0435\u0448\u043d\u043e \u0438\u0437\u0443\u0447\u0438\u043b\u0438 \u0432\u0441\u0435 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044b \u0438 \u043e\u0442\u0432\u0435\u0442\u0438\u043b\u0438 \u043d\u0430 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c\u043d\u044b\u0435 \u0432\u043e\u043f\u0440\u043e\u0441\u044b.</p>' +
    '<button class="confirm-btn" onclick="window.location.href=\'/modules/\'+MODULE_ID+\'/preview/\'">\u0412\u0435\u0440\u043d\u0443\u0442\u044c\u0441\u044f \u043a \u043c\u043e\u0434\u0443\u043b\u044e</button>' +
    '</div></div></div>';

  vp.innerHTML = html;
}

// ══════════════════════════════════════════════════
//  Навигация и прогресс
// ══════════════════════════════════════════════════
function completeAndNext(slideIndex) {
  completedSlides.add(slideIndex);
  updateProgress();
  updateDots();
  // Когда все слайды пройдены — отмечаем этап как завершённый
  if (completedSlides.size === SLIDES_DATA.length && STEP_ID) {
    fetch('/api/progress/step/' + STEP_ID + '/complete/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCSRF()}
    }).catch(function(){});
  }
  if (currentSlide < TOTAL_SLIDES - 1) goToSlide(currentSlide + 1);
}

function initDots() {
  var dc = document.getElementById('slideDots');
  for (var i = 0; i < TOTAL_SLIDES; i++) {
    var dot = document.createElement('div');
    dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
    (function(idx) {
      dot.addEventListener('click', function() {
        if (completedSlides.has(idx) || idx === currentSlide || idx === 0) goToSlide(idx);
      });
    })(i);
    dc.appendChild(dot);
  }
}

function updateProgress() {
  var pct = (completedSlides.size / SLIDES_DATA.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = completedSlides.size + ' / ' + SLIDES_DATA.length;
}

function updateDots() {
  document.querySelectorAll('.slide-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === currentSlide);
    d.classList.toggle('completed', completedSlides.has(i));
  });
}

function goToSlide(index) {
  if (index === currentSlide) return;
  var slides = document.querySelectorAll('.slide');
  var prevIdx = currentSlide;
  slides[prevIdx].classList.remove('active');
  slides[prevIdx].classList.add('exit-left');
  setTimeout(function() { slides[prevIdx].classList.remove('exit-left'); }, 600);
  currentSlide = index;
  slides[currentSlide].classList.add('active');
  var inner = slides[currentSlide].querySelector('.slide-inner');
  if (inner) inner.scrollTop = 0;
  updateDots();
}

// ══════════════════════════════════════════════════
//  Квиз-оверлей
// ══════════════════════════════════════════════════
function showQuiz(slideIndex) {
  var quiz = SLIDES_DATA[slideIndex].quiz;
  if (!quiz) { completeAndNext(slideIndex); return; }
  document.getElementById('quizSlideLabel').textContent = '\u0421\u043b\u0430\u0439\u0434 ' + (slideIndex + 1) + ' \u0438\u0437 ' + SLIDES_DATA.length;
  document.getElementById('quizQuestion').textContent = quiz.question;
  var oc = document.getElementById('quizOptions');
  oc.innerHTML = '';
  quiz.options.forEach(function(opt, i) {
    var div = document.createElement('div');
    div.className = 'quiz-option';
    div.innerHTML = '<span class="opt-letter">' + LETTERS[i] + '</span><span>' + opt + '</span>';
    (function(idx) {
      div.addEventListener('click', function() { handleAnswer(slideIndex, idx); });
    })(i);
    oc.appendChild(div);
  });
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizNextBtn').className = 'quiz-next-btn';
  document.getElementById('quizRetryBtn').className = 'quiz-retry-btn';
  document.getElementById('quizOverlay').classList.add('visible');
}

function handleAnswer(slideIndex, answerIndex) {
  var quiz = SLIDES_DATA[slideIndex].quiz;
  var opts = document.querySelectorAll('.quiz-option');
  var fb = document.getElementById('quizFeedback');
  opts.forEach(function(o) { o.classList.add('disabled'); });
  if (answerIndex === quiz.correct) {
    opts[answerIndex].classList.add('correct');
    fb.className = 'quiz-feedback success show';
    fb.textContent = '\u2705 ' + quiz.feedback;
    document.getElementById('quizNextBtn').className = 'quiz-next-btn show';
    completedSlides.add(slideIndex);
    updateProgress();
    updateDots();
  } else {
    opts[answerIndex].classList.add('wrong');
    opts[quiz.correct].classList.add('correct');
    fb.className = 'quiz-feedback fail show';
    fb.textContent = '\u274c \u041d\u0435\u0432\u0435\u0440\u043d\u043e. ' + quiz.feedback;
    document.getElementById('quizRetryBtn').className = 'quiz-retry-btn show';
  }
}

function nextSlide() {
  document.getElementById('quizOverlay').classList.remove('visible');
  setTimeout(function() {
    if (currentSlide < TOTAL_SLIDES - 1) goToSlide(currentSlide + 1);
  }, 300);
}

function retryQuiz() {
  document.getElementById('quizOverlay').classList.remove('visible');
}

// ══════════════════════════════════════════════════
//  Mobile viewport height fix
// ══════════════════════════════════════════════════
function setVH() {
  document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
}
setVH();
window.addEventListener('resize', setVH);

// ══════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════
buildSlides();
initDots();
updateProgress();
</script>
