<!-- course_detail.html -->
{% extends 'base/base.html' %}
{% block title %}{{ course.short_name }} — ДВИК СЭО{% endblock %}

{% block extra_css %}
<style>
.course-banner {
  background: {{ course.cover_bg|default:'linear-gradient(135deg,#0f62ae,#08305a)' }};
  color: #fff; padding: 24px 28px 20px;
}
.cb-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.3); border-radius: var(--radius-sm);
  color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background .14s; margin-bottom: 14px;
}
.cb-back:hover { background: rgba(255,255,255,0.28); }
.cb-back svg { width: 14px; height: 14px; }
.cb-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.cb-author { font-size: 13px; opacity: .8; }

.progress-bar-section { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 28px; }
.pb-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
.pb-outer { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.pb-inner { height: 100%; background: var(--status-green); border-radius: 4px; transition: width .5s; }

.steps-list { padding: 24px 28px; max-width: 800px; }
.step-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 16px; margin-bottom: 8px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-card);
  transition: border-color .15s;
}
.step-item:hover { border-color: var(--accent-mid); }
.step-item.done { opacity: .7; }
.step-item.done .step-title { text-decoration: line-through; }

.step-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.step-icon.online   { background: var(--accent-light); }
.step-icon.pdf      { background: #fde7e9; }
.step-icon.practice { background: #fff4ce; }
.step-icon.upload   { background: #e8f4f0; }
.step-icon.test     { background: var(--status-green-bg); }

.step-body { flex: 1; min-width: 0; }
.step-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 3px; }
.step-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
.step-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

.step-action { flex-shrink: 0; }
.btn-complete {
  padding: 7px 14px; border-radius: var(--radius-sm);
  border: none; font-family: var(--font); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .14s;
}
.btn-complete.todo {
  background: var(--status-green-bg); color: var(--status-green);
  border: 1.5px solid #8fcb8f;
}
.btn-complete.todo:hover { background: #c0e8c0; }
.btn-complete.completed {
  background: var(--status-green); color: #fff;
}

.step-emojis { online: '🎓', pdf: '📄', practice: '🔧', upload: '📤', test: '✅' }
</style>
{% endblock %}

{% block content %}
<div class="course-banner">
  <a href="{% url 'home' %}" class="cb-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 3L5 8l5 5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Назад
  </a>
  <div class="cb-title">{{ course.title }}</div>
  <div class="cb-author">{{ course.author }}</div>
</div>

<div class="progress-bar-section">
  <div class="pb-label">
    <span>Прогресс</span>
    <span id="progressText">{{ progress }}%</span>
  </div>
  <div class="pb-outer">
    <div class="pb-inner" id="progressBar" style="width:{{ progress }}%"></div>
  </div>
</div>

<div class="steps-list" id="stepsList"></div>

<script>
const CSRF = '{{ csrf_token }}';
const STEPS = {{ steps_json|safe }};
const TYPE_EMOJI = {online:'🎓', pdf:'📄', practice:'🔧', upload:'📤', test:'✅'};
const TYPE_LABEL = {online:'Онлайн-лекция', pdf:'PDF-материал', practice:'Практика', upload:'Загрузка работы', test:'Тестирование'};

function renderSteps() {
  const list = document.getElementById('stepsList');
  list.innerHTML = STEPS.map(s => {
    const doneClass = s.done ? ' done' : '';
    const btnClass = s.done ? 'completed' : 'todo';
    const btnText = s.done ? '✓ Пройдено' : 'Отметить';
    return `
      <div class="step-item${doneClass}" data-id="${s.id}">
        <div class="step-icon ${s.type}">${TYPE_EMOJI[s.type]||'📘'}</div>
        <div class="step-body">
          <div class="step-type">${TYPE_LABEL[s.type]||s.type}</div>
          <div class="step-title">${s.title}</div>
          ${s.url ? `<div class="step-meta"><a href="${s.url}" target="_blank" style="color:var(--accent)">Открыть →</a></div>` : ''}
          ${s.date ? `<div class="step-meta">📅 ${s.date}</div>` : ''}
        </div>
        <div class="step-action">
          <button class="btn-complete ${btnClass}" onclick="completeStep(${s.id})"
            ${s.done ? 'disabled' : ''}>${btnText}</button>
        </div>
      </div>`;
  }).join('');
}

async function completeStep(stepId) {
  const resp = await fetch(`/courses/step/${stepId}/complete/`, {
    method: 'POST',
    headers: {'X-CSRFToken': CSRF},
  });
  const data = await resp.json();
  if (data.ok) {
    const step = STEPS.find(s => s.id === stepId);
    if (step) step.done = true;
    document.getElementById('progressText').textContent = data.progress + '%';
    document.getElementById('progressBar').style.width = data.progress + '%';
    renderSteps();
  }
}

renderSteps();
</script>
{% endblock %}
